id: lab-06
title: "Lab 06 — Build Your Own Agent"
repo_name: "se-toolkit-lab-6"

discovery:
  mode: "alias_repo_name"
  default_branch: "main"

scoring:
  mode: "weighted"
  pass_threshold: 0.75
  score_required_only: true

tasks:
  - id: setup
    title: "Lab setup"
  - id: task-1
    title: "Task 1: Call an LLM from Code"
    prerequisite: setup
  - id: task-2
    title: "Task 2: The Documentation Agent"
    prerequisite: task-1
  - id: task-3
    title: "Task 3: The System Agent"
    prerequisite: task-2

checks:

  # =====================================================
  # SETUP — repo-level checks only (no VM, no SSH)
  # =====================================================

  - id: repo_exists
    task: setup
    title: "Repository exists and is accessible"
    class: structural
    runner: code
    type: repo_exists
    is_required: true
    weight: 5
    hint: >
      Your repository is not accessible. Make sure you forked the lab repo
      and that your fork is public (Settings -> Danger Zone -> Change visibility).
    params: {}

  - id: repo_is_fork
    task: setup
    title: "Repository is a fork"
    class: structural
    runner: code
    type: repo_is_fork
    is_required: true
    weight: 3
    depends_on: [repo_exists]
    hint: >
      Your repository must be a fork of the course instructors' repo.
      Fork it from https://github.com/inno-se-toolkit/se-toolkit-lab-6.
    params: {}

  - id: repo_has_issues
    task: setup
    title: "Issues are enabled"
    class: structural
    runner: code
    type: repo_has_issues
    is_required: true
    weight: 2
    depends_on: [repo_exists]
    hint: >
      Enable issues in your repo: Settings -> General -> Features -> Issues.
    params: {}

  # =====================================================
  # TASK 1: Call an LLM from Code — repo checks only
  # =====================================================

  - id: task1_issue_exists
    task: task-1
    title: "Task 1 issue exists"
    class: process
    runner: code
    type: issue_exists
    is_required: true
    weight: 2
    hint: >
      Create a GitHub issue with the title:
      [Task] Call an LLM from Code
    params:
      title_regex: "\\[Task\\]\\s+Call an LLM"

  - id: task1_plan_exists
    task: task-1
    title: "Plan file exists (plans/task-1.md)"
    class: structural
    runner: code
    type: file_nonempty
    is_required: true
    weight: 2
    depends_on: [repo_exists]
    hint: >
      Create plans/task-1.md with your agent implementation plan
      before writing code.
    params:
      path: "plans/task-1.md"

  - id: task1_agent_exists
    task: task-1
    title: "agent.py exists in project root"
    class: structural
    runner: code
    type: file_nonempty
    is_required: true
    weight: 3
    depends_on: [repo_exists]
    hint: >
      Create agent.py in the project root. This is the CLI entry point
      that takes a question and returns a JSON answer.
    params:
      path: "agent.py"

  - id: task1_agent_md_exists
    task: task-1
    title: "AGENT.md documentation exists"
    class: structural
    runner: code
    type: file_nonempty
    is_required: true
    weight: 2
    depends_on: [repo_exists]
    hint: >
      Create AGENT.md documenting your agent's architecture, LLM provider,
      tools, system prompt strategy, and how to run it.
    params:
      path: "AGENT.md"

  - id: task1_reads_env_vars
    task: task-1
    title: "Agent reads LLM config from environment variables"
    class: structural
    runner: code
    type: regex_in_file
    is_required: true
    weight: 3
    depends_on: [task1_agent_exists]
    hint: >
      Your agent must read LLM_API_KEY, LLM_API_BASE, and LLM_MODEL
      from environment variables (not hardcoded). The autochecker will
      inject its own LLM credentials when evaluating your agent.
    params:
      path: "agent.py"
      pattern: "LLM_API_KEY|LLM_API_BASE|LLM_MODEL"
      min_matches: 2

  - id: task1_tests_exist
    task: task-1
    title: "Regression tests exist"
    class: structural
    runner: code
    type: glob_exists
    is_required: true
    weight: 2
    depends_on: [repo_exists]
    hint: >
      Create at least 1 regression test for your agent.
      Test files should be named test_*.py or *_test.py.
    params:
      patterns: ["test_*.py", "tests/test_*.py", "*_test.py"]
      min_matches: 1

  - id: task1_issue_has_linked_pr
    task: task-1
    title: "Task issue is closed by a PR"
    class: process
    runner: code
    type: issue_has_linked_pr
    is_required: true
    weight: 2
    hint: >
      Create a PR that closes the issue using 'Closes #<issue-number>'
      in the PR description.
    params:
      title_regex: "\\[Task\\]\\s+Call an LLM"
      merged: true

  - id: task1_pr_approved
    task: task-1
    title: "Task 1 PR has at least 1 approval"
    class: process
    runner: code
    type: issue_pr_approved
    is_required: true
    weight: 2
    hint: >
      Ask your partner to review and approve your PR.
    params:
      title_regex: "\\[Task\\]\\s+Call an LLM"
      min_approvals: 1

  # =====================================================
  # TASK 2: The Documentation Agent — repo checks only
  # =====================================================

  - id: task2_issue_exists
    task: task-2
    title: "Task 2 issue exists"
    class: process
    runner: code
    type: issue_exists
    is_required: true
    weight: 2
    hint: >
      Create a GitHub issue with the title:
      [Task] The Documentation Agent
    params:
      title_regex: "\\[Task\\]\\s+(The )?Documentation Agent"

  - id: task2_plan_exists
    task: task-2
    title: "Plan file exists (plans/task-2.md)"
    class: structural
    runner: code
    type: file_nonempty
    is_required: true
    weight: 2
    depends_on: [repo_exists]
    hint: >
      Create plans/task-2.md with your documentation agent implementation plan
      before writing code.
    params:
      path: "plans/task-2.md"

  - id: task2_has_read_file
    task: task-2
    title: "Agent code has read_file tool"
    class: structural
    runner: code
    type: regex_in_file
    is_required: true
    weight: 3
    depends_on: [task1_agent_exists]
    hint: >
      Implement a read_file tool in agent.py that reads files from
      the project directory (especially wiki files).
    params:
      path: "agent.py"
      pattern: "read_file"
      min_matches: 2

  - id: task2_has_list_files
    task: task-2
    title: "Agent code has list_files tool"
    class: structural
    runner: code
    type: regex_in_file
    is_required: true
    weight: 3
    depends_on: [task1_agent_exists]
    hint: >
      Implement a list_files tool in agent.py that lists files and
      directories in the project (to discover wiki files).
    params:
      path: "agent.py"
      pattern: "list_files"
      min_matches: 2

  - id: task2_has_tool_schemas
    task: task-2
    title: "Agent defines tool schemas for function calling"
    class: structural
    runner: code
    type: regex_in_file
    is_required: true
    weight: 3
    depends_on: [task1_agent_exists]
    hint: >
      Define your tools as JSON schemas in the tools parameter of your
      API request. The LLM uses these schemas to decide which tool to call.
    params:
      path: "agent.py"
      pattern: "\"type\":\\s*\"function\"|'type':\\s*'function'|tool_calls|function_call"
      min_matches: 1

  - id: task2_issue_has_linked_pr
    task: task-2
    title: "Task issue is closed by a PR"
    class: process
    runner: code
    type: issue_has_linked_pr
    is_required: true
    weight: 2
    hint: >
      Create a PR that closes the issue using 'Closes #<issue-number>'
      in the PR description.
    params:
      title_regex: "\\[Task\\]\\s+(The )?Documentation Agent"
      merged: true

  - id: task2_pr_approved
    task: task-2
    title: "Task 2 PR has at least 1 approval"
    class: process
    runner: code
    type: issue_pr_approved
    is_required: true
    weight: 2
    hint: >
      Ask your partner to review and approve your PR.
    params:
      title_regex: "\\[Task\\]\\s+(The )?Documentation Agent"
      min_approvals: 1

  # =====================================================
  # TASK 3: The System Agent — clone_and_run eval
  # =====================================================

  - id: task3_issue_exists
    task: task-3
    title: "Task 3 issue exists"
    class: process
    runner: code
    type: issue_exists
    is_required: true
    weight: 2
    hint: >
      Create a GitHub issue with the title:
      [Task] The System Agent
    params:
      title_regex: "\\[Task\\]\\s+(The )?System Agent"

  - id: task3_plan_exists
    task: task-3
    title: "Plan file exists (plans/task-3.md)"
    class: structural
    runner: code
    type: file_nonempty
    is_required: true
    weight: 2
    depends_on: [repo_exists]
    hint: >
      Create plans/task-3.md with your system agent implementation plan
      and benchmark iteration strategy.
    params:
      path: "plans/task-3.md"

  - id: task3_has_query_api
    task: task-3
    title: "Agent code has query_api tool"
    class: structural
    runner: code
    type: regex_in_file
    is_required: true
    weight: 3
    depends_on: [task1_agent_exists]
    hint: >
      Implement a query_api tool in agent.py that makes HTTP requests
      to the backend API.
    params:
      path: "agent.py"
      pattern: "query_api"
      min_matches: 2

  - id: task3_reads_api_base_url
    task: task-3
    title: "Agent reads AGENT_API_BASE_URL from environment"
    class: structural
    runner: code
    type: regex_in_file
    is_required: true
    weight: 2
    depends_on: [task1_agent_exists]
    hint: >
      Your query_api tool must read the backend base URL from the
      AGENT_API_BASE_URL environment variable (default: http://localhost:42002).
      The autochecker injects its own URL when evaluating.
    params:
      path: "agent.py"
      pattern: "AGENT_API_BASE_URL"
      min_matches: 1

  - id: task3_local_eval
    task: task-3
    title: "Agent passes local questions (100%)"
    class: execution
    runner: code
    type: agent_eval
    is_required: true
    weight: 8
    depends_on: [task1_agent_exists, task3_has_query_api]
    hint: >
      Run run_eval.py locally to test your agent against the 10 local questions.
      Your agent must pass all of them.
      Fix failing questions one at a time.
    params:
      eval_lab: "lab-06"
      include_bot_only: false
      min_pass_rate: 1.0
      timeout_per_question: 60

  - id: task3_hidden_eval
    task: task-3
    title: "Agent passes hidden eval (100%)"
    class: execution
    runner: code
    type: agent_eval
    is_required: true
    weight: 15
    depends_on: [task3_local_eval]
    hint: >
      The autochecker tests additional hidden questions beyond run_eval.py.
      Your agent must pass all of them. Build a genuinely working agent,
      not hard-coded answers.
    params:
      eval_lab: "lab-06"
      bot_only_exclusively: true
      min_pass_rate: 1.0
      timeout_per_question: 60

  - id: task3_agent_md_updated
    task: task-3
    title: "AGENT.md documents final architecture and lessons learned"
    class: structural
    runner: code
    type: file_word_count
    is_required: true
    weight: 2
    depends_on: [repo_exists]
    hint: >
      Update AGENT.md with your final architecture, lessons learned,
      and evaluation score. At least 200 words.
    params:
      path: "AGENT.md"
      min_words: 200

  - id: task3_issue_has_linked_pr
    task: task-3
    title: "Task issue is closed by a PR"
    class: process
    runner: code
    type: issue_has_linked_pr
    is_required: true
    weight: 2
    hint: >
      Create a PR that closes the issue using 'Closes #<issue-number>'
      in the PR description.
    params:
      title_regex: "\\[Task\\]\\s+(The )?System Agent"
      merged: true

  - id: task3_pr_approved
    task: task-3
    title: "Task 3 PR has at least 1 approval"
    class: process
    runner: code
    type: issue_pr_approved
    is_required: true
    weight: 2
    hint: >
      Ask your partner to review and approve your PR.
    params:
      title_regex: "\\[Task\\]\\s+(The )?System Agent"
      min_approvals: 1
