id: lab-07
title: "Lab 07 — Build a Client with an AI Coding Agent"
repo_name: "se-toolkit-lab-7"

discovery:
  mode: "alias_repo_name"
  default_branch: "main"

scoring:
  mode: "weighted"
  pass_threshold: 0.75
  score_required_only: true

tasks:
  - id: setup
    title: "Lab setup"
  - id: task-1
    title: "Task 1: Plan and Scaffold"
    prerequisite: setup
  - id: task-2
    title: "Task 2: Backend Integration"
    prerequisite: setup
  - id: task-3
    title: "Task 3: Intent-Based Natural Language Routing"
    prerequisite: setup
  - id: task-4
    title: "Task 4: Containerize and Document"
    prerequisite: setup

checks:

  # =====================================================
  # SETUP — repo, VM, env files, backend, LLM
  # =====================================================

  - id: repo_exists
    task: setup
    title: "Repository exists and is accessible"
    class: structural
    runner: code
    type: repo_exists
    is_required: true
    weight: 5
    hint: >
      Your repository is not accessible. Make sure you forked the lab repo
      and that your fork is public (Settings -> Danger Zone -> Change visibility).
    params: {}

  - id: repo_config
    task: setup
    title: "Repository is a fork with issues enabled"
    class: structural
    runner: code
    type: any_of
    is_required: true
    weight: 5
    depends_on: [repo_exists]
    hint: >
      Your repository must be a fork of https://github.com/inno-se-toolkit/se-toolkit-lab-7
      with issues enabled (Settings -> General -> Features -> Issues).
    params:
      checks:
        - type: repo_is_fork
          params: {}

  - id: ssh_connectivity
    task: setup
    title: "SSH login as your main user works"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    hint: >
      The autochecker needs to SSH into your VM as your main user.
      Add the autochecker SSH key to ~/.ssh/authorized_keys and register
      your VM username with the autochecker bot. See setup step 1.8.
    params:
      runtime: prod
      username: __vm_username__
      command: "echo ok"

  - id: vm_setup
    task: setup
    title: "Repo, env files, and config present on VM"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [ssh_connectivity]
    hint: >
      On your VM: (1) Clone your fork at ~/se-toolkit-lab-7,
      (2) Create .env.docker.secret from .env.docker.example,
      (3) Create .env.bot.secret from .env.bot.example with BOT_TOKEN and LMS_API_KEY.
      See setup steps 1.7 and 1.10.
    params:
      runtime: prod
      username: __vm_username__
      command: "test -d ~/se-toolkit-lab-7/.git && test -f ~/se-toolkit-lab-7/.env.docker.secret && grep -q BOT_TOKEN ~/se-toolkit-lab-7/.env.bot.secret && grep -q LMS_API_KEY ~/se-toolkit-lab-7/.env.bot.secret && echo ok"
      expect_regex: "ok"
      timeout: 10

  - id: backend_running
    task: setup
    title: "Backend running with data (port 42002)"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [vm_setup]
    hint: >
      Deploy backend: cd ~/se-toolkit-lab-7 && docker compose --env-file .env.docker.secret up --build -d
      Then sync data: curl -X POST http://localhost:42002/pipeline/sync -H "Authorization: Bearer YOUR_KEY" -H "Content-Type: application/json" -d '{}'
    params:
      runtime: prod
      username: __vm_username__
      command: "LMS_KEY=$(grep LMS_API_KEY ~/se-toolkit-lab-7/.env.bot.secret | cut -d= -f2); curl -sf http://localhost:42002/items/ -H \"Authorization: Bearer $LMS_KEY\" | python3 -c 'import sys,json; items=json.load(sys.stdin); exit(0 if len(items)>0 else 1)' 2>/dev/null && echo ok || echo fail"
      expect_regex: "ok"
      timeout: 15

  - id: llm_available
    task: setup
    title: "LLM API is reachable (Qwen proxy on port 42005)"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [ssh_connectivity]
    hint: >
      Set up the Qwen Code API on your VM (see setup step 1.9).
      If the token expired, restart the proxy: cd ~/qwen-code-oai-proxy && docker compose restart
    params:
      runtime: prod
      username: __vm_username__
      command: "LLM_KEY=$(grep LLM_API_KEY ~/se-toolkit-lab-7/.env.bot.secret | cut -d= -f2); curl -sf http://localhost:42005/v1/models -H \"Authorization: Bearer $LLM_KEY\" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(len(d.get(\"data\",[])))' 2>/dev/null || echo 0"
      expect_regex: "^[1-9]"
      timeout: 15

  # =====================================================
  # TASK 1: Plan and Scaffold
  # =====================================================

  - id: t1_plan_exists
    task: task-1
    title: "bot/PLAN.md exists with ≥100 words"
    class: structural
    runner: code
    type: file_word_count
    is_required: true
    weight: 3
    depends_on: [repo_exists]
    hint: >
      Create bot/PLAN.md with your development plan. Must be at least 100 words.
      Ask your coding agent to help you produce it.
    params:
      path: "bot/PLAN.md"
      min_words: 100

  - id: t1_deps
    task: task-1
    title: "bot/pyproject.toml exists"
    class: structural
    runner: code
    type: file_exists
    is_required: true
    weight: 3
    depends_on: [repo_exists]
    hint: >
      Your bot must have a pyproject.toml in the bot/ directory for dependency management.
      Do not create requirements.txt — use pyproject.toml and uv exclusively.
    params:
      path: "bot/pyproject.toml"

  - id: t1_handlers
    task: task-1
    title: "Handler directory exists with at least one module"
    class: structural
    runner: code
    type: glob_exists
    is_required: true
    weight: 3
    depends_on: [repo_exists]
    hint: >
      Create bot/handlers/ directory with at least one Python module.
      Handlers should be plain functions separated from the Telegram transport layer.
    params:
      patterns: ["bot/handlers/*.py", "bot/handlers/**/*.py"]

  - id: t1_install
    task: task-1
    title: "Bot dependencies install without errors"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [repo_on_vm]
    hint: >
      Run on your VM: cd ~/se-toolkit-lab-7/bot && uv sync
      Fix any dependency errors in pyproject.toml.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7 && git pull -q 2>/dev/null; cd bot && uv sync 2>&1 | tail -5; echo EXIT:$?"
      expect_regex: "EXIT:0"
      timeout: 60

  # Task 1 eval set (deterministic, no LLM)
  - id: t1_eval_start
    task: task-1
    title: '--test "/start" returns output'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [t1_install]
    hint: >
      Run: cd ~/se-toolkit-lab-7/bot && uv run bot.py --test "/start"
      Must print a welcome message and exit with code 0.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test '/start' 2>/dev/null"
      expect_regex: ".{5,}"
      timeout: 30

  - id: t1_eval_help
    task: task-1
    title: '--test "/help" returns output (unseen)'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 3
    depends_on: [t1_install]
    hint: >
      The /help command should return available commands. It can return placeholder
      text for now — it must not crash.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test '/help' 2>/dev/null"
      expect_regex: ".{5,}"
      timeout: 30

  - id: t1_eval_unknown
    task: task-1
    title: '--test "/foo" does not crash (unseen)'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 3
    depends_on: [t1_install]
    hint: >
      Unknown commands must not crash the bot. They should return a helpful message.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test '/foo' 2>/dev/null; echo EXIT:$?"
      expect_regex: "EXIT:0"
      timeout: 30

  # =====================================================
  # TASK 2: Backend Integration
  # =====================================================

  - id: t2_eval_start
    task: task-2
    title: '--test "/start" returns welcome message'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 3
    depends_on: [t1_install, backend_running]
    hint: >
      /start should return a welcome message containing "welcome" or your bot's name.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test '/start' 2>/dev/null"
      expect_regex: "(?i)(welcome|bot|assistant|lms)"
      timeout: 30

  - id: t2_eval_help
    task: task-2
    title: '--test "/help" lists ≥4 commands'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 3
    depends_on: [t1_install]
    hint: >
      /help should list at least 4 slash commands with descriptions.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test '/help' 2>/dev/null | grep -c '/' || echo 0"
      expect_regex: "^[4-9]|^[1-9][0-9]"
      timeout: 30

  - id: t2_eval_health
    task: task-2
    title: '--test "/health" reports backend status'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [t1_install, backend_running]
    hint: >
      /health should call the backend and report healthy/unhealthy status.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test '/health' 2>/dev/null"
      expect_regex: "(?i)(health|ok|running|available|status|items)"
      timeout: 30

  - id: t2_eval_labs
    task: task-2
    title: '--test "/labs" returns lab list'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [t1_install, backend_running, data_synced]
    hint: >
      /labs should list available labs from the backend. Make sure the ETL sync
      has been run so the database has data.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test '/labs' 2>/dev/null | wc -l"
      expect_regex: "^[2-9]|^[1-9][0-9]"
      timeout: 30

  - id: t2_eval_scores
    task: task-2
    title: '--test "/scores lab-04" returns task scores'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [t1_install, backend_running, data_synced]
    hint: >
      /scores lab-04 should show per-task pass rates with percentages.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test '/scores lab-04' 2>/dev/null | wc -l"
      expect_regex: "^[2-9]|^[1-9][0-9]"
      timeout: 30

  - id: t2_eval_scores_other
    task: task-2
    title: '--test "/scores lab-01" works for different lab (unseen)'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 3
    depends_on: [t1_install, backend_running, data_synced]
    hint: >
      /scores should work for any lab, not just lab-04.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test '/scores lab-01' 2>/dev/null"
      expect_regex: ".{10,}"
      timeout: 30

  - id: t2_eval_scores_noarg
    task: task-2
    title: '--test "/scores" without argument does not crash (unseen)'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 3
    depends_on: [t1_install]
    hint: >
      /scores without an argument should return a helpful message, not a crash.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && OUTPUT=$(uv run bot.py --test '/scores' 2>/dev/null); RC=$?; echo \"$OUTPUT\" | head -3; echo EXIT:$RC"
      expect_regex: "EXIT:0"
      timeout: 30

  - id: t2_eval_error
    task: task-2
    title: "Error handling: no traceback when backend is down"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [t1_install]
    hint: >
      When the backend is down, the bot must show a user-friendly error message
      that includes the actual error (e.g., "connection refused", "HTTP 502").
      It must NOT show a raw Python traceback.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        cd ~/se-toolkit-lab-7 &&
        docker compose --env-file .env.docker.secret stop app 2>/dev/null;
        OUTPUT=$(cd bot && uv run bot.py --test '/health' 2>/dev/null);
        docker compose --env-file .env.docker.secret start app 2>/dev/null;
        echo "$OUTPUT" | grep -c 'Traceback' | xargs -I{} test {} -eq 0 && echo "NO_TRACEBACK" || echo "HAS_TRACEBACK"
      expect_regex: "NO_TRACEBACK"
      timeout: 60

  # =====================================================
  # TASK 3: Intent-Based Natural Language Routing
  # =====================================================

  - id: t3_buttons
    task: task-3
    title: "Source code contains keyboard/button setup"
    class: structural
    runner: code
    type: regex_in_file
    is_required: true
    weight: 3
    depends_on: [repo_exists]
    hint: >
      Add inline keyboard buttons or a reply keyboard for common actions.
      Your source code should contain InlineKeyboardMarkup, ReplyKeyboardMarkup,
      InlineKeyboardButton, or equivalent.
    params:
      path: "bot/"
      pattern: "InlineKeyboard|ReplyKeyboard|keyboard|CallbackQuery"
      min_matches: 1

  - id: t3_tools
    task: task-3
    title: "Source code defines ≥9 tool/function schemas for LLM"
    class: structural
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [repo_on_vm]
    hint: >
      Define all 9 backend endpoints as LLM tool schemas. Each tool needs
      "type": "function" in the schema definition. See the task description
      for the list of required tools.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7 && grep -r '\"type\".*:.*\"function\"' bot/ 2>/dev/null | wc -l"
      expect_regex: "^[9-9]$|^[1-9][0-9]"
      timeout: 15

  # Task 3 eval set (LLM-dependent — uses student's Qwen proxy)
  - id: t3_eval_labs
    task: task-3
    title: 'NL: "what labs are available" returns data'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [t1_install, backend_running, llm_available]
    hint: >
      Plain text query (no / prefix) should use LLM to determine intent
      and fetch data from the backend. If you see "LLM error: HTTP 401",
      restart the Qwen proxy: cd ~/qwen-code-oai-proxy && docker compose restart
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test 'what labs are available' 2>/dev/null | wc -c"
      expect_regex: "^[2-9][0-9]|^[1-9][0-9][0-9]"
      timeout: 60

  - id: t3_eval_scores
    task: task-3
    title: 'NL: "show me scores for lab 4" returns data'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [t1_install, backend_running, llm_available]
    hint: >
      The LLM should call the right tool with the right argument (lab-04).
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test 'show me scores for lab 4' 2>/dev/null"
      expect_regex: "\\d"
      timeout: 60

  - id: t3_eval_multi
    task: task-3
    title: 'NL: "which lab has the lowest pass rate" mentions a lab'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [t1_install, backend_running, llm_available]
    hint: >
      Multi-step query: the bot should call get_items, then get_pass_rates
      for each lab, compare, and name the lab with the lowest rate.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test 'which lab has the lowest pass rate' 2>/dev/null"
      expect_regex: "(?i)(lab.{0,5}\\d|Lab \\d)"
      timeout: 90

  - id: t3_eval_fallback
    task: task-3
    title: 'NL: "asdfgh" returns helpful fallback'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 3
    depends_on: [t1_install]
    hint: >
      Gibberish input should return a helpful message listing capabilities,
      not a crash or empty response.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && OUTPUT=$(uv run bot.py --test 'asdfgh' 2>/dev/null); RC=$?; echo \"$OUTPUT\" | head -5; echo EXIT:$RC"
      expect_regex: "EXIT:0"
      timeout: 60

  - id: t3_eval_top
    task: task-3
    title: 'NL: "top 3 students in lab 4" returns data (unseen)'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 3
    depends_on: [t1_install, backend_running, llm_available]
    hint: >
      Unseen query — the LLM should extract the limit (3) and lab (lab-04)
      and call get_top_learners.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test 'top 3 students in lab 4' 2>/dev/null"
      expect_regex: ".{10,}"
      timeout: 60

  - id: t3_eval_learners
    task: task-3
    title: 'NL: "how many students are enrolled" returns data (unseen)'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 3
    depends_on: [t1_install, backend_running, llm_available]
    hint: >
      Unseen query — the LLM should call get_learners.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && uv run bot.py --test 'how many students are enrolled' 2>/dev/null"
      expect_regex: "\\d"
      timeout: 60

  - id: t3_eval_greeting
    task: task-3
    title: 'NL: "hello" returns friendly response (unseen)'
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 2
    depends_on: [t1_install]
    hint: >
      A greeting should get a friendly response, not a crash.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7/bot && OUTPUT=$(uv run bot.py --test 'hello' 2>/dev/null); RC=$?; echo \"$OUTPUT\" | head -3; echo EXIT:$RC"
      expect_regex: "EXIT:0"
      timeout: 60

  # =====================================================
  # TASK 4: Containerize and Document
  # =====================================================

  - id: t4_dockerfile
    task: task-4
    title: "bot/Dockerfile exists"
    class: structural
    runner: code
    type: file_exists
    is_required: true
    weight: 3
    depends_on: [repo_exists]
    hint: >
      Create a Dockerfile in bot/ that installs dependencies with uv sync
      and runs the bot entry point.
    params:
      path: "bot/Dockerfile"

  - id: t4_readme_deploy
    task: task-4
    title: "README has a deploy/containerize section"
    class: structural
    runner: code
    type: regex_in_file
    is_required: true
    weight: 3
    depends_on: [repo_exists]
    hint: >
      Add a "Deploy" or "Containerize" section to your README explaining
      required env vars, docker compose commands, and how to verify.
    params:
      path: "README.md"
      pattern: "(?i)^#{1,3}\\s.*(deploy|containerize)"
      min_matches: 1

  - id: t4_repo_match
    task: task-4
    title: "Deployed code matches student's GitHub repo"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [repo_on_vm]
    hint: >
      The code deployed on your VM must be from your own GitHub repo.
      Run: cd ~/se-toolkit-lab-7 && git remote get-url origin
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7 && git remote get-url origin"
      expect_regex: "(?i)github.com.*se-toolkit-lab-7"
      timeout: 15

  - id: t4_compose
    task: task-4
    title: "docker-compose.yml includes a bot service"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [repo_on_vm]
    hint: >
      Add a 'bot' service to your docker-compose.yml that builds from bot/Dockerfile.
    params:
      runtime: prod
      username: __vm_username__
      command: "export PATH=$HOME/.local/bin:$PATH && cd ~/se-toolkit-lab-7 && grep -c 'bot:' docker-compose.yml"
      expect_regex: "^[1-9]"
      timeout: 15

  - id: t4_running
    task: task-4
    title: "Bot container is running"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [t4_compose]
    hint: >
      Start the bot container: docker compose --env-file .env.docker.secret up --build -d
      Make sure the bot container appears in 'docker ps'.
    params:
      runtime: prod
      username: __vm_username__
      command: "docker ps --format '{{.Names}}' | grep -i bot | head -1"
      expect_regex: "bot"
      timeout: 15

  - id: t4_health
    task: task-4
    title: "Backend still healthy alongside the bot"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 3
    depends_on: [t4_running]
    hint: >
      The backend must still be accessible after deploying the bot container.
    params:
      runtime: prod
      username: __vm_username__
      command: "curl -s -o /dev/null -w '%{http_code}' http://localhost:42002/docs"
      expect_regex: "200"
      timeout: 15
