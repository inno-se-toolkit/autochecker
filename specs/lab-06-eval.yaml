- index: 3
  question: "List all API router modules in the backend. What domain does each one handle?"
  expected: {contains_all: ["items", "interactions", "analytics", "pipeline"]}
  check_tools: [list_files]
  feedback: "Use list_files on the backend routers directory, then read each file's purpose."
  tier: 1
  # LO (lab 2): Explore the code of an existing web server

# --- Class C: Data-dependent queries (local) ---

- index: 4
  question: "How many items are currently stored in the database? Query the running API to find out."
  expected: {numeric_gt: 0}
  check_tools: [query_api]
  feedback: "Query the /items/ endpoint with authentication and count the results."
  tier: 2
  # LO (lab 3): Query the API, inspect responses

- index: 5
  question: "What HTTP status code does the API return when you request /items/ without sending an authentication header?"
  expected: {any_of: ["401", "403"]}
  check_tools: [query_api]
  feedback: "Make a request without the API key header and check the response status code."
  tier: 2
  # LO (lab 3): Authenticate API requests

# --- Class D: Bug diagnosis (local) ---

- index: 6
  question: "Query the /analytics/completion-rate endpoint for a lab that has no data (e.g., lab-99). What error do you get, and what is the bug in the source code?"
  expected: {any_of: ["ZeroDivisionError", "division by zero", "divide by zero"]}
  expected_source: {any_of: ["analytics.py", "analytics"]}
  check_tools: [query_api, read_file]
  feedback: "Try GET /analytics/completion-rate?lab=lab-99. Read the error response, then find the buggy line in the analytics router."
  tier: 2
  # Class D: Bug diagnosis — division by zero when no learners exist

- index: 7
  question: "The /analytics/top-learners endpoint crashes for some labs. Query it, find the error, and read the source code to explain what went wrong."
  expected: {any_of: ["TypeError", "None", "NoneType", "sorted", "comparison"]}
  expected_source: {any_of: ["analytics.py", "analytics"]}
  check_tools: [query_api, read_file]
  feedback: "Try GET /analytics/top-learners with different labs. Read the analytics router source to find the sorting bug."
  tier: 2
  # Class D: Bug diagnosis — TypeError sorting None scores

# --- Class E: LLM-judged reasoning (local) ---

- index: 8
  question: "Read the docker-compose.yml and the backend Dockerfile. Explain the full journey of an HTTP request from the browser to the database and back."
  rubric: "Answer must trace the path through: (1) Caddy reverse proxy, (2) FastAPI app inside Docker container, (3) authentication middleware, (4) router/endpoint, (5) SQLModel/SQLAlchemy ORM, (6) PostgreSQL database. At least 4 of these 6 hops must be mentioned."
  check_tools: [read_file]
  feedback: "Read docker-compose.yml, Caddyfile, the Dockerfile, and main.py to trace the request path."
  tier: 2
  # Class E: Request lifecycle through the stack

- index: 9
  question: "Read the ETL pipeline code. Explain how it ensures idempotency — what happens if the same data is loaded twice?"
  rubric: "Answer must: (1) identify the idempotency mechanism (checking external_id before inserting), (2) explain that duplicate records are skipped, (3) mention the upsert-like pattern. Mentioning 'external_id' or 'existing check' is essential."
  check_tools: [read_file]
  feedback: "Read etl.py carefully, especially the load function. Look for how it handles duplicates."
  tier: 2
  # Class E: ETL idempotency explanation

