- index: 5
  question: "Which HTTP method is idempotent: PUT or POST?"
  expected: {contains: "PUT"}
  tier: 1

- index: 6
  question: "What HTTP status code means 'Not Found'?"
  expected: {contains: "404"}
  tier: 1

- index: 7
  question: "What HTTP status code means 'Unauthorized'?"
