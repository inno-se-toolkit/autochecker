# Lab 06 — Agent Evaluation Question Bank (v2)
#
# 25 script questions (index 0-24) — served via GET /api/eval/question
# 14 bot-only questions (index 25-38) — only in autochecker SSH eval
#
# Every question maps to a learning outcome from labs 1-6.
# Every question is something a software engineer should genuinely know.
# No trivia, no "read file X and tell me what's there" filler.
#
# Matching strategies:
#   contains: answer contains substring (case-insensitive)
#   contains_all: answer contains ALL substrings
#   any_of: answer contains ANY substring
#   regex: answer matches regex
#   numeric_gt: answer contains a number > N
#   numeric_range: answer contains a number in [min, max]
#
# requires_tool: tool name the agent must use (verified by bot eval)
# expected_source: optional source field check (same matching strategies)
# feedback: hint shown on failure instead of expected value (for tier 2+)

# =============================================================================
# SCRIPT QUESTIONS (0-24)
# =============================================================================

# --- Tier 1: Conceptual / scenario questions (no tools) ---

# Lab 1 — Git workflow, collaboration

- index: 0
  question: "A teammate pushes broken code directly to main and the production server goes down. What Git workflow practice would have prevented this?"
  expected: {any_of: ["pull request", "branch", "code review", "PR", "feature branch"]}
  tier: 1
  # LO: Use branches, PRs, and reviews to collaborate

- index: 1
  question: "You see a commit message that just says 'fix'. Why is this a problem, and what should a good commit message include instead?"
  expected: {any_of: ["why", "what changed", "context", "descriptive", "purpose", "understand"]}
  tier: 1
  # LO: Commits with clear messages

- index: 2
  question: "Your teammate and you both edited the same line in the same file on different branches. What happens when you try to merge, and how do you resolve it?"
  expected: {any_of: ["conflict", "merge conflict", "manually", "resolve", "choose", "both changes"]}
  tier: 1
  # LO: Collaboration via Git

# Lab 2 — Backend, Docker, deployment

- index: 3
  question: "You change your Python code and run 'docker compose up -d', but the API still serves the old version. What went wrong?"
  expected: {any_of: ["--build", "build", "rebuild", "image", "cached"]}
  tier: 1
  # LO: Run a web server using Docker Compose

- index: 4
  question: "Your Docker container stores uploaded files in /app/uploads. After redeploying, all files are gone. Why, and how do you fix this?"
  expected: {any_of: ["volume", "persist", "mount", "ephemeral", "not persistent"]}
  tier: 1
  # LO: Understand containers, volumes, deployment

- index: 5
  question: "What is the difference between running a React app with 'npm run dev' and serving it through a reverse proxy like Caddy in production?"
  expected: {any_of: ["hot reload", "built", "static", "bundled", "optimized", "production build", "development server"]}
  tier: 1
  # LO (lab 4): Differentiate dev server vs production static files

# Lab 3 — REST API, security

- index: 6
  question: "Your API returns 401 for one request and 403 for another. What is the difference between these two status codes?"
  expected: {any_of: ["authenticated", "authorized", "identity", "permission", "who you are", "allowed"]}
  tier: 1
  # LO: Authenticate API requests

- index: 7
  question: "A POST request to create a user succeeds. What HTTP status code should the API return, and why not just 200?"
  expected: {any_of: ["201", "Created", "specific", "semantic"]}
  tier: 1
  # LO: Explore a REST API

- index: 8
  question: "Your VM is exposed to the internet. Name two concrete steps you would take to harden it against attacks."
  expected: {any_of: ["firewall", "fail2ban", "SSH key", "disable password", "ufw", "close port", "root login"]}
  tier: 1
  # LO: Harden a Linux server (firewall, fail2ban, SSH)

# Lab 4 — Testing

- index: 9
  question: "Your unit tests call a real PostgreSQL database. They pass on your machine but fail in CI where there is no database. What should you do?"
  expected: {any_of: ["mock", "stub", "in-memory", "fake", "isolat", "don't depend", "test double"]}
  tier: 1
  # LO: Construct unit tests, mock external services

- index: 10
  question: "You write a function that accepts ages 0-120. Which specific input values should you test to catch off-by-one bugs?"
  expected: {any_of: ["0", "120", "boundary", "-1", "121", "edge", "limit"]}
  tier: 1
  # LO: Construct tests for boundary-value cases

- index: 11
  question: "What is the purpose of end-to-end tests? Why aren't unit tests alone sufficient?"
  expected: {any_of: ["integration", "whole system", "components together", "real", "user flow", "interact", "full stack"]}
  tier: 1
  # LO: Differentiate unit and e2e tests

# Lab 5 — ETL, SQL, data pipelines

- index: 12
  question: "An external API has 10,000 records but returns at most 100 per request. How does your ETL pipeline fetch all of them?"
  expected: {any_of: ["paginat", "offset", "page", "next", "loop", "multiple requests", "cursor", "has_more"]}
  tier: 1
  # LO: Handle pagination

- index: 13
  question: "Your ETL pipeline crashes halfway through loading. When you restart, some records appear twice. What technique prevents this?"
  expected: {any_of: ["idempoten", "upsert", "ON CONFLICT", "INSERT OR UPDATE", "deduplic"]}
  tier: 1
  # LO: Handle idempotent upserts

- index: 14
  question: "You want the average score per student group. Write the key SQL clauses you would use (not the full query, just the approach)."
  expected: {any_of: ["GROUP BY", "AVG", "group by"]}
  tier: 1
  # LO: Write SQL aggregation queries

# Lab 6 — Agents, LLM tool calling

- index: 15
  question: "A user asks your agent 'How many items are in the database?' but the LLM has no database access. How does the agent answer this without hallucinating?"
  expected: {any_of: ["tool", "function call", "query", "API call", "external", "look up"]}
  tier: 1
  # LO: Explain the agentic loop, why tools matter

- index: 16
  question: "Your agent calls a tool but the tool returns an error. What should the agent do next?"
  expected: {any_of: ["retry", "different", "report", "handle", "fall back", "try again", "error message", "inform"]}
  tier: 1
  # LO: Debug agent behavior, handle tool errors

