# Lab 06 — Agent Evaluation Question Bank (v3)
#
# 20 questions: 10 local (index 0-9) + 10 bot-only (index 10-19)
# 5 classes × 4 questions (2 local + 2 bot-only)
#
# Classes:
#   A — Wiki lookup (read_file/list_files on wiki/ directory)
#   B — Static system facts (read_file/list_files on code)
#   C — Data-dependent queries (query_api to student VM)
#   D — Bug diagnosis chain (query_api → error → read_file → explain)
#   E — LLM-judged reasoning (read code, synthesize, explain)
#
# Eval runs on dev server with student's cloned repo.
# query_api routes to student VM through relay.
#
# Matching strategies:
#   contains / contains_all / any_of / regex / numeric_gt / numeric_range
#
# Tiers:
#   1 — Class A + B (file reading, no API needed)
#   2 — Class C + D + E (needs running API on student VM)

# =============================================================================
# LOCAL QUESTIONS (0-9) — served via run_eval.py, student can test locally
# =============================================================================

# --- Class A: Wiki lookup (local) ---

- index: 0
  question: "According to the project wiki, what steps are needed to protect a branch on GitHub? Find the answer in the wiki directory."
  expected: {contains_all: ["branch", "protect"]}
  expected_source: {contains: "wiki"}
  check_tools: [read_file]
  feedback: "Use list_files to find GitHub-related wiki pages, then read the section about branch protection."
  tier: 1
  # LO (lab 1): Use branches and PRs to collaborate

- index: 1
  question: "What does the project wiki say about connecting to your VM via SSH? Summarize the key steps."
  expected: {any_of: ["ssh", "SSH", "key", "connect"]}
  expected_source: {contains: "wiki"}
  check_tools: [read_file]
  feedback: "Look in the wiki/ directory for a file about VMs, then read the SSH connection section."
  tier: 1
  # LO (lab 2): Deploy to a VM

# --- Class B: Static system facts (local) ---

- index: 2
