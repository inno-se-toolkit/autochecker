# --- Class E: LLM-judged reasoning (bot-only) ---

- index: 18
  question: "Compare how the ETL pipeline handles failures vs how the API endpoints handle failures. Which approach is more robust and why?"
  rubric: "Answer must: (1) describe ETL error handling (e.g., raise_for_status, pagination retry), (2) describe API endpoint error handling (e.g., returns empty list, no try/except), (3) compare them, (4) give a reasoned judgment about which is more robust."
  check_tools: [read_file]
  feedback: "Read both the ETL code (etl.py) and the API router code (routers/), then compare their error handling strategies."
  tier: 2
  bot_only: true
  # Class E: ETL vs API error handling comparison

- index: 19
  question: "Read the authentication code and docker-compose.yml. Explain how the LMS_API_KEY flows from the .env file to the point where it validates a request. Trace every step."
  rubric: "Answer must trace: (1) .env.docker.secret file, (2) docker-compose.yml environment variable mapping, (3) app settings/config loading, (4) FastAPI dependency injection or middleware, (5) comparison with the request header. At least 4 of these 5 steps must be mentioned."
  check_tools: [read_file]
  feedback: "Start from docker-compose.yml environment section, follow the variable into the app config, then into the auth dependency."
  tier: 2
  bot_only: true
  # Class E: Auth flow tracing
