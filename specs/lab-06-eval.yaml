# Lab 06 — Agent Evaluation Question Bank
#
# 25 script questions (served via /api/eval/question)
# 9 bot-only questions (only in autochecker SSH eval)
#
# Matching strategies:
#   contains: answer contains substring (case-insensitive)
#   contains_all: answer contains ALL substrings
#   any_of: answer contains ANY substring
#   regex: answer matches pattern
#   numeric_gt: answer contains a number > N
#   numeric_range: answer contains a number in [min, max]
#
# requires_tool: tool name(s) the agent should use (for bot verification)

# =============================================================================
# SCRIPT QUESTIONS (0-24) — served by the API, ordered by difficulty
# =============================================================================

# --- Git (lab 1) ---

- index: 0
  question: "What does the command 'git checkout -b feature' do?"
  expected: {contains_all: ["create", "branch"]}
  tier: 1

- index: 1
  question: "What is a pull request?"
  expected: {any_of: ["review", "merge", "propose changes", "code review"]}
  tier: 1

- index: 2
  question: "What is the purpose of a .gitignore file?"
  expected: {any_of: ["ignore", "exclude", "untracked", "not track"]}
  tier: 1

- index: 3
  question: "What are conventional commits? Give an example prefix."
  expected: {any_of: ["feat:", "fix:", "docs:", "test:", "chore:", "refactor:"]}
  tier: 1

# --- HTTP & REST (labs 2-3) ---

- index: 4
  question: "What does REST stand for?"
