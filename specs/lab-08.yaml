id: lab-08
title: "Lab 08 — The Agent is the Interface"
repo_name: "se-toolkit-lab-8"

discovery:
  mode: "alias_repo_name"
  default_branch: "main"

scoring:
  mode: "weighted"
  pass_threshold: 0.75
  score_required_only: true

requires_lms_key: false

tasks:
  - id: setup
    title: "Lab setup"
  - id: task-1
    title: "Task 1: Set Up the Agent"
    prerequisite: setup
  - id: task-2
    title: "Task 2: Deploy and Connect a Web Client"
    prerequisite: setup
  - id: task-3
    title: "Task 3: Give the Agent New Eyes"
    prerequisite: setup
  - id: task-4
    title: "Task 4: Diagnose a Failure and Make the Agent Proactive"
    prerequisite: setup

checks:

  # =====================================================
  # SETUP — repo, VM, env files, backend, LLM, otel
  # =====================================================

  - id: repo_exists
    task: setup
    title: "Repository exists and is accessible"
    class: structural
    runner: code
    type: repo_exists
    is_required: true
    weight: 5
    hint: >
      Your repository is not accessible. Make sure you forked the lab repo
      and that your fork is public (Settings -> Danger Zone -> Change visibility).
    params: {}

  - id: repo_config
    task: setup
    title: "Repository is a fork with issues enabled"
    class: structural
    runner: code
    type: any_of
    is_required: true
    weight: 5
    depends_on: [repo_exists]
    hint: >
      Your repository must be a fork of https://github.com/inno-se-toolkit/se-toolkit-lab-8
      with issues enabled (Settings -> General -> Features -> Issues).
    params:
      checks:
        - type: repo_is_fork
          params: {}

  - id: ssh_connectivity
    task: setup
    title: "SSH login as your main user works"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    hint: >
      The autochecker needs to SSH into your VM as your main user.
      Add the autochecker SSH key to ~/.ssh/authorized_keys and register
      your VM username with the autochecker bot. See setup step 1.8.
    params:
      runtime: prod
      username: __vm_username__
      command: "echo ok"

  - id: vm_setup
    task: setup
    title: "Repo, env file, and submodule present on VM"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [ssh_connectivity]
    hint: >
      On your VM: (1) Clone your fork at ~/se-toolkit-lab-8 with --recurse-submodules,
      (2) Create .env.docker.secret from .env.docker.example.
      See setup steps 1.2 and 1.4.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        OK=1;
        test -d ~/se-toolkit-lab-8/.git || { echo "missing: ~/se-toolkit-lab-8/.git directory"; OK=0; };
        test -f ~/se-toolkit-lab-8/.env.docker.secret || { echo "missing: .env.docker.secret"; OK=0; };
        test -e ~/se-toolkit-lab-8/qwen-code-api/.git || { echo "missing: qwen-code-api submodule (clone with --recurse-submodules)"; OK=0; };
        if [ -f ~/se-toolkit-lab-8/.env.docker.secret ]; then
        grep -q 'LMS_API_KEY=' ~/se-toolkit-lab-8/.env.docker.secret || { echo "missing: LMS_API_KEY in .env.docker.secret"; OK=0; };
        grep -q 'QWEN_CODE_API_KEY=' ~/se-toolkit-lab-8/.env.docker.secret || { echo "missing: QWEN_CODE_API_KEY in .env.docker.secret"; OK=0; };
        fi;
        [ "$OK" = "1" ] && echo ok
      expect_regex: "ok"
      timeout: 10

  - id: backend_running
    task: setup
    title: "Backend running with data (port 42002)"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [vm_setup]
    hint: >
      Deploy backend: cd ~/se-toolkit-lab-8 && docker compose --env-file .env.docker.secret up --build -d
      Then sync data: open Swagger at http://localhost:42002/docs, run POST /pipeline/sync.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        LMS_KEY=$(grep '^LMS_API_KEY=' ~/se-toolkit-lab-8/.env.docker.secret | cut -d= -f2- | tr -d '"'"'"' ');
        if [ -z "$LMS_KEY" ]; then echo "fail: LMS_API_KEY not found in .env.docker.secret"; exit 0; fi;
        HTTP=$(curl -s -o /tmp/_ac_items -w '%{http_code}' http://localhost:42002/items/ -H "Authorization: Bearer $LMS_KEY");
        if [ "$HTTP" = "000" ]; then echo "fail: connection refused on port 42002 (is docker running?)"; exit 0; fi;
        if [ "$HTTP" != "200" ]; then echo "fail: backend returned HTTP $HTTP"; exit 0; fi;
        COUNT=$(python3 -c 'import sys,json; print(len(json.load(sys.stdin)))' < /tmp/_ac_items 2>&1);
        if ! echo "$COUNT" | grep -qE '^[0-9]+$'; then echo "fail: could not parse response: $COUNT"; exit 0; fi;
        if [ "$COUNT" = "0" ]; then echo "fail: backend returned 0 items (run POST /pipeline/sync first)"; exit 0; fi;
        echo ok
      expect_regex: "ok"
      timeout: 15

  - id: llm_available
    task: setup
    title: "LLM API is reachable (Qwen proxy on port 42005)"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [vm_setup]
    hint: >
      The Qwen Code API must be running on port 42005.
      Check: docker compose --env-file .env.docker.secret ps qwen-code-api
    params:
      runtime: prod
      username: __vm_username__
      command: >
        QWEN_KEY=$(grep '^QWEN_CODE_API_KEY=' ~/se-toolkit-lab-8/.env.docker.secret | cut -d= -f2- | tr -d '"'"'"' ');
        HTTP=$(curl -s -o /tmp/_ac_llm -w '%{http_code}' http://localhost:42005/v1/models -H "X-API-Key: $QWEN_KEY");
        if [ "$HTTP" = "000" ]; then echo "0 (connection refused on port 42005)"; exit 0; fi;
        if [ "$HTTP" != "200" ]; then echo "0 (proxy returned HTTP $HTTP)"; exit 0; fi;
        COUNT=$(python3 -c 'import sys,json; d=json.load(sys.stdin); print(len(d.get("data",[])))' < /tmp/_ac_llm 2>&1);
        if ! echo "$COUNT" | grep -qE '^[0-9]+$'; then echo "0 (failed to parse: $COUNT)"; exit 0; fi;
        echo $COUNT
      expect_regex: "^[1-9]"
      timeout: 15

  - id: otel_stack
    task: setup
    title: "Observability stack running (VictoriaLogs + VictoriaTraces + OTel)"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [vm_setup]
    hint: >
      The observability stack (victorialogs, victoriatraces, otel-collector) must be running.
      These are part of the base docker-compose.yml — just run docker compose up.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        VL=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:42010/health);
        VT=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:42011/health);
        OTEL=$(cd ~/se-toolkit-lab-8 && docker compose --env-file .env.docker.secret ps otel-collector --format '{{.State}}' 2>/dev/null);
        echo "victorialogs:$VL victoriatraces:$VT otel:$OTEL";
        test "$VL" = "200" && test "$VT" = "200" && echo "$OTEL" | grep -qi running && echo PASS || echo FAIL
      expect_regex: "PASS"
      timeout: 15

  # =====================================================
  # TASK 1: Set Up the Agent
  # =====================================================

  - id: t1_structural
    task: task-1
    title: "Nanobot project, config, MCP tools, and skill prompt set up"
    class: structural
    runner: code
    type: ssh_check
    is_required: true
    weight: 10
    depends_on: [ssh_connectivity]
    hint: >
      Complete all parts of Task 1:
      (A) uv init nanobot && cd nanobot && uv add nanobot-ai, then run nanobot onboard.
      (B) uv add lms-mcp --editable ../mcp, register MCP server in config.json.
      (C) Create nanobot/workspace/skills/lms/SKILL.md with tool usage strategy.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        D=~/se-toolkit-lab-8/nanobot; OK=1;
        test -f $D/pyproject.toml || { echo "missing: nanobot/pyproject.toml"; OK=0; };
        grep -q 'nanobot-ai' $D/pyproject.toml 2>/dev/null || { echo "missing: nanobot-ai dependency"; OK=0; };
        test -f $D/config.json || { echo "missing: nanobot/config.json"; OK=0; };
        grep -q '"providers"\|"provider"' $D/config.json 2>/dev/null || { echo "missing: providers in config.json"; OK=0; };
        grep -qE 'mcp_lms|"lms"' $D/config.json 2>/dev/null || { echo "missing: lms MCP server in config.json"; OK=0; };
        F=$D/workspace/skills/lms/SKILL.md;
        test -f "$F" || { echo "missing: skills/lms/SKILL.md"; OK=0; };
        if [ -f "$F" ]; then WC=$(wc -w < "$F"); test "$WC" -ge 30 || { echo "skill too short ($WC words)"; OK=0; }; fi;
        [ "$OK" = "1" ] && echo ok
      expect_regex: "ok"
      timeout: 10

  - id: t1_agent_answers
    task: task-1
    title: "Agent answers 'What labs are available?' with real backend data"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 10
    depends_on: [t1_structural, backend_running, llm_available]
    hint: >
      Run: cd ~/se-toolkit-lab-8/nanobot && NANOBOT_LMS_BACKEND_URL=http://localhost:42002 NANOBOT_LMS_API_KEY=YOUR_KEY uv run nanobot agent -c ./config.json -m "What labs are available?"
      The agent should return real lab names from the backend, not hallucinated ones.
      If you get an LLM error, check that the Qwen proxy is running and the token is fresh.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        export PATH=$HOME/.local/bin:$PATH;
        cd ~/se-toolkit-lab-8/nanobot;
        LMS_KEY=$(grep '^LMS_API_KEY=' ~/se-toolkit-lab-8/.env.docker.secret | cut -d= -f2- | tr -d '"'"'"' ');
        NANOBOT_LMS_BACKEND_URL=http://localhost:42002 NANOBOT_LMS_API_KEY=$LMS_KEY uv run nanobot agent -c ./config.json -m "What labs are available?" 2>/dev/null | tail -20
      expect_regex: "(?i)(Lab.{0,5}0[1-6]|products|architecture|backend|testing|pipeline|agent)"
      timeout: 90

  - id: t1_report
    task: task-1
    title: "REPORT.md Task 1 sections verified by LLM"
    class: content
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [repo_exists, llm_available]
    hint: >
      Add checkpoint evidence to REPORT.md under sections:
      ## Task 1A — Bare agent, ## Task 1B — Agent with LMS tools, ## Task 1C — Skill prompt.
      Each section must contain the agent's actual response (copy-pasted from terminal).
    params:
      runtime: prod
      username: __vm_username__
      command: >
        python3 -c "
        import json,urllib.request,os;
        r=open(os.path.expanduser('~/se-toolkit-lab-8/REPORT.md')).read()[:4000];
        e=open(os.path.expanduser('~/se-toolkit-lab-8/.env.docker.secret')).read();
        k=[l.split('=',1)[1].strip().strip('\"').strip(\"'\") for l in e.splitlines() if l.startswith('QWEN_CODE_API_KEY=')][0];
        p='Evaluate this lab report for Task 1. FAIL if any of these are missing: (1) Task 1A section with a PASTED agent response showing actual text the agent said (not a summary of what happened). (2) Task 1B section with a pasted response containing real lab names like Lab 01, Lab 02 etc. (3) Task 1C section showing the agent asking which lab or listing options. Generic descriptions like \"the agent responded\" without actual pasted output = FAIL. Reply with exactly PASS or FAIL on the first line, then a short reason.';
        d=json.dumps({'model':'coder-model','messages':[{'role':'user','content':p+chr(10)+chr(10)+r}],'max_tokens':100}).encode();
        q=urllib.request.Request('http://localhost:42005/v1/chat/completions',d,{'Content-Type':'application/json','X-API-Key':k});
        o=json.loads(urllib.request.urlopen(q,timeout=30).read());
        print(o['choices'][0]['message']['content'])
        " 2>&1 || echo "FAIL: could not reach LLM"
      expect_regex: "(?i)PASS"
      timeout: 60

  # =====================================================
  # TASK 2: Deploy the Agent and Add Web Client
  # =====================================================

  - id: t2_structural
    task: task-2
    title: "Nanobot Dockerfile, compose services, and Caddy routes configured"
    class: structural
    runner: code
    type: ssh_check
    is_required: true
    weight: 10
    depends_on: [ssh_connectivity, repo_exists]
    hint: >
      Complete Task 2: create nanobot/entrypoint.py and nanobot/Dockerfile,
      uncomment nanobot + client-web-flutter in docker-compose.yml,
      uncomment /ws/chat and /flutter in caddy/Caddyfile.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        D=~/se-toolkit-lab-8; OK=1;
        test -f $D/nanobot/entrypoint.py || { echo "missing: nanobot/entrypoint.py"; OK=0; };
        test -f $D/nanobot/Dockerfile || { echo "missing: nanobot/Dockerfile"; OK=0; };
        grep -q '^  nanobot:' $D/docker-compose.yml 2>/dev/null || { echo "missing: nanobot service in compose (still commented?)"; OK=0; };
        grep -q 'client-web-flutter:' $D/docker-compose.yml 2>/dev/null || { echo "missing: client-web-flutter service in compose"; OK=0; };
        grep -q '/ws/chat' $D/caddy/Caddyfile 2>/dev/null && ! grep -q '# .*handle /ws/chat' $D/caddy/Caddyfile 2>/dev/null || { echo "missing: /ws/chat route in Caddyfile (still commented?)"; OK=0; };
        grep -q '/flutter' $D/caddy/Caddyfile 2>/dev/null && ! grep -q '# .*handle.*flutter' $D/caddy/Caddyfile 2>/dev/null || { echo "missing: /flutter route in Caddyfile (still commented?)"; OK=0; };
        [ "$OK" = "1" ] && echo ok
      expect_regex: "ok"
      timeout: 10

  - id: t2_deployed
    task: task-2
    title: "Full stack working: Flutter serves content, WebSocket accepts, agent responds"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 10
    depends_on: [vm_setup, t2_structural, llm_available]
    hint: >
      The full chain must work end-to-end:
      1. Flutter at /flutter must serve real content (main.dart.js present).
      2. WebSocket at /ws/chat must accept connections with the correct NANOBOT_ACCESS_KEY.
      3. The agent must respond through the WebSocket without LLM errors.
      Common issues: entrypoint env var names must match docker-compose.yml,
      Caddyfile routes must be uncommented, flutter volume must be mounted in caddy.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        cd ~/se-toolkit-lab-8; OK=1;
        NANO=$(docker compose --env-file .env.docker.secret ps nanobot --format '{{.State}}' 2>/dev/null);
        echo "$NANO" | grep -qi running || { echo "FAIL: nanobot not running ($NANO)"; exit 0; };
        curl -s http://localhost:42002/flutter/ | grep -qE 'flutter_bootstrap|main\.dart\.js|flutter\.js' || { echo "FAIL: /flutter serves empty page (flutter volume not mounted or build failed)"; exit 0; };
        ACCESS_KEY=$(grep '^NANOBOT_ACCESS_KEY=' .env.docker.secret | cut -d= -f2- | tr -d '"'"'"' ');
        export PATH=$HOME/.local/bin:$PATH;
        RESP=$(cd ~/se-toolkit-lab-8 && uv run python3 -c "
        import json,asyncio,websockets;
        async def test():
            uri='ws://localhost:42002/ws/chat?access_key=$ACCESS_KEY';
            async with websockets.connect(uri,close_timeout=5) as ws:
                await ws.send(json.dumps({'content':'hello'}));
                r=await asyncio.wait_for(ws.recv(),timeout=60);
                return r
        print(asyncio.run(test()))
        " 2>&1);
        echo "ws_response: $RESP";
        echo "$RESP" | grep -qi 'invalid access key' && { echo "FAIL: WebSocket rejected access key (check NANOBOT_ACCESS_KEY env var)"; exit 0; };
        echo "$RESP" | grep -qi 'Connection error\|Connection refused' && { echo "FAIL: agent cannot reach LLM (check entrypoint reads correct env vars from compose)"; exit 0; };
        echo "$RESP" | grep -qE '.{10,}' && echo PASS || echo "FAIL: empty or short WebSocket response"
      expect_regex: "PASS"
      timeout: 90

  - id: t2_report
    task: task-2
    title: "REPORT.md Task 2 sections verified by LLM"
    class: content
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [repo_exists, llm_available]
    hint: >
      Add checkpoint evidence to REPORT.md under ## Task 2A and ## Task 2B.
      Include startup log excerpts and a Flutter screenshot or conversation.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        python3 -c "
        import json,urllib.request,os;
        r=open(os.path.expanduser('~/se-toolkit-lab-8/REPORT.md')).read()[:4000];
        e=open(os.path.expanduser('~/se-toolkit-lab-8/.env.docker.secret')).read();
        k=[l.split('=',1)[1].strip().strip('\"').strip(\"'\") for l in e.splitlines() if l.startswith('QWEN_CODE_API_KEY=')][0];
        p='Evaluate this lab report for Task 2. FAIL if any of these are missing: (1) Task 2A section with PASTED nanobot startup log showing MCP tools registered or gateway started. (2) Task 2B section with evidence of a working Flutter conversation - either a pasted WebSocket response or a description of a real agent answer seen in the chat. Summaries like \"it worked\" without pasted output = FAIL. Reply with exactly PASS or FAIL on the first line, then a short reason.';
        d=json.dumps({'model':'coder-model','messages':[{'role':'user','content':p+chr(10)+chr(10)+r}],'max_tokens':100}).encode();
        q=urllib.request.Request('http://localhost:42005/v1/chat/completions',d,{'Content-Type':'application/json','X-API-Key':k});
        o=json.loads(urllib.request.urlopen(q,timeout=30).read());
        print(o['choices'][0]['message']['content'])
        " 2>&1 || echo "FAIL: could not reach LLM"
      expect_regex: "(?i)PASS"
      timeout: 60

  # =====================================================
  # TASK 3: Observability Tools for the Agent
  # =====================================================

  - id: t3_structural
    task: task-3
    title: "Observability skill and MCP tools for logs/traces exist"
    class: structural
    runner: code
    type: ssh_check
    is_required: true
    weight: 10
    depends_on: [ssh_connectivity, otel_stack]
    hint: >
      Task 3C requires adding observability MCP tools (for logs and traces).
      Add them to the existing lms MCP server or write a new one. The tools must
      query VictoriaLogs and/or VictoriaTraces. Also create
      nanobot/workspace/skills/observability/SKILL.md.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        D=~/se-toolkit-lab-8; OK=1;
        F=$D/nanobot/workspace/skills/observability/SKILL.md;
        test -f "$F" || { echo "missing: observability skill"; OK=0; };
        if [ -f "$F" ]; then WC=$(wc -w < "$F"); test "$WC" -ge 30 || { echo "skill too short ($WC words)"; OK=0; }; fi;
        grep -rqiE 'victoria|logsql|42010|42011|9428|10428|logs_search|traces_list|logs_error' $D/mcp/ $D/nanobot/ 2>/dev/null || { echo "no code referencing VictoriaLogs/Traces endpoints found in mcp/ or nanobot/"; OK=0; };
        [ "$OK" = "1" ] && echo ok
      expect_regex: "ok"
      timeout: 10

  - id: t3_agent_observability
    task: task-3
    title: "Agent answers observability question with real log/trace data"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 10
    depends_on: [t3_structural, backend_running, llm_available]
    hint: >
      The agent should be able to answer 'Any errors in the last hour?' by querying
      VictoriaLogs via its observability MCP tools and returning real data.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        export PATH=$HOME/.local/bin:$PATH;
        cd ~/se-toolkit-lab-8/nanobot;
        LMS_KEY=$(grep '^LMS_API_KEY=' ~/se-toolkit-lab-8/.env.docker.secret | cut -d= -f2- | tr -d '"'"'"' ');
        NANOBOT_LMS_BACKEND_URL=http://localhost:42002 NANOBOT_LMS_API_KEY=$LMS_KEY uv run nanobot agent -c ./config.json -m "Any errors in the last hour? Check the logs." 2>/dev/null | tail -20
      expect_regex: "(?i)(error|log|no error|0 error|trace|request|status|found|search)"
      timeout: 90

  - id: t3_report
    task: task-3
    title: "REPORT.md Task 3 sections verified by LLM"
    class: content
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [repo_exists, llm_available]
    hint: >
      Add checkpoint evidence to REPORT.md under ## Task 3A, ## Task 3B, ## Task 3C.
      Include log excerpts, trace screenshots, and observability tool output.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        python3 -c "
        import json,urllib.request,os;
        r=open(os.path.expanduser('~/se-toolkit-lab-8/REPORT.md')).read()[:5000];
        e=open(os.path.expanduser('~/se-toolkit-lab-8/.env.docker.secret')).read();
        k=[l.split('=',1)[1].strip().strip('\"').strip(\"'\") for l in e.splitlines() if l.startswith('QWEN_CODE_API_KEY=')][0];
        p='Evaluate this lab report for Task 3. FAIL if any of these are missing: (1) Task 3A section with PASTED structured log entries showing JSON fields like level, service, event, trace_id. (2) Task 3B section with pasted trace data or a description of specific spans seen in VictoriaTraces. (3) Task 3C section showing the agent answering an observability question with real data (error counts, trace info). Vague descriptions without actual data = FAIL. Reply with exactly PASS or FAIL on the first line, then a short reason.';
        d=json.dumps({'model':'coder-model','messages':[{'role':'user','content':p+chr(10)+chr(10)+r}],'max_tokens':100}).encode();
        q=urllib.request.Request('http://localhost:42005/v1/chat/completions',d,{'Content-Type':'application/json','X-API-Key':k});
        o=json.loads(urllib.request.urlopen(q,timeout=30).read());
        print(o['choices'][0]['message']['content'])
        " 2>&1 || echo "FAIL: could not reach LLM"
      expect_regex: "(?i)PASS"
      timeout: 60

  # =====================================================
  # TASK 4: Diagnose a Failure and Make the Agent Proactive
  # =====================================================

  - id: t4_enhanced_skill
    task: task-4
    title: "Observability skill enhanced for multi-step investigation"
    class: structural
    runner: code
    type: ssh_check
    is_required: true
    weight: 5
    depends_on: [ssh_connectivity]
    hint: >
      Update nanobot/workspace/skills/observability/SKILL.md to teach the agent
      multi-step investigation: search logs -> extract trace IDs -> fetch traces -> summarize.
    params:
      runtime: prod
      username: __vm_username__
      command: >
        F=~/se-toolkit-lab-8/nanobot/workspace/skills/observability/SKILL.md;
        test -f "$F" || { echo "missing: $F"; exit 0; };
        WC=$(wc -w < "$F");
        test "$WC" -ge 60 && echo ok || echo "fail: skill needs more detail ($WC words, need >=60)"
      expect_regex: "ok"
      timeout: 10

  - id: t4_report
    task: task-4
    title: "REPORT.md Task 4 sections verified by LLM"
    class: content
    runner: code
    type: ssh_check
    is_required: true
    weight: 10
    depends_on: [repo_exists, llm_available]
    hint: >
      Document in REPORT.md under ## Task 4A (multi-step investigation),
      ## Task 4B (proactive health check), ## Task 4C (bug fix and recovery).
    params:
      runtime: prod
      username: __vm_username__
      command: >
        python3 -c "
        import json,urllib.request,os;
        r=open(os.path.expanduser('~/se-toolkit-lab-8/REPORT.md')).read()[-5000:];
        e=open(os.path.expanduser('~/se-toolkit-lab-8/.env.docker.secret')).read();
        k=[l.split('=',1)[1].strip().strip('\"').strip(\"'\") for l in e.splitlines() if l.startswith('QWEN_CODE_API_KEY=')][0];
        p='Evaluate this lab report for Task 4. FAIL if any of these are missing: (1) Task 4A with a PASTED agent conversation showing the agent chaining log search and trace fetch in one response - must include actual error messages or trace IDs from the output. (2) Task 4B with evidence of a proactive health report appearing in the chat (pasted message with timestamp or cron config shown). (3) Task 4C with the specific bug identified (file and line), the code fix described or shown as a diff, and verification that errors stopped. Generic summaries without concrete details = FAIL. Reply with exactly PASS or FAIL on the first line, then a short reason.';
        d=json.dumps({'model':'coder-model','messages':[{'role':'user','content':p+chr(10)+chr(10)+r}],'max_tokens':100}).encode();
        q=urllib.request.Request('http://localhost:42005/v1/chat/completions',d,{'Content-Type':'application/json','X-API-Key':k});
        o=json.loads(urllib.request.urlopen(q,timeout=30).read());
        print(o['choices'][0]['message']['content'])
        " 2>&1 || echo "FAIL: could not reach LLM"
      expect_regex: "(?i)PASS"
      timeout: 60

