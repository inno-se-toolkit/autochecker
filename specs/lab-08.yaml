  - id: t4_bug_fixed
    task: task-4
    title: "Planted bug fixed: DB failure returns 500, not 404"
    class: execution
    runner: code
    type: ssh_check
    is_required: true
    weight: 10
    depends_on: [vm_setup, backend_running]
    hint: >
      The backend has a planted bug that turns database failures into misleading
      404 responses. Find it using the agent (stop postgres, trigger /items, investigate
      with logs/traces), fix the code, and redeploy. After the fix, a DB failure
      should return a proper 500 error, not a 404.
    params:
      runtime: prod
      username: __vm_username__
      command: |
        python3 << 'PYEOF'
        import sys, os, subprocess, time, urllib.request, urllib.error

        base = os.path.expanduser("~/se-toolkit-lab-8")
        env_file = os.path.join(base, ".env.docker.secret")
        compose = ["docker", "compose", "--env-file", env_file]

        # Read API key
        api_key = None
        for line in open(env_file):
            if line.startswith("LMS_API_KEY="):
                api_key = line.split("=", 1)[1].strip().strip("\"'")
        if not api_key:
            print("FAIL: LMS_API_KEY not set in .env.docker.secret"); sys.exit(0)

        # Stop postgres, test, always restart
        try:
            subprocess.run(compose + ["stop", "postgres"],
                           capture_output=True, timeout=15, cwd=base)
            time.sleep(2)

            url = "http://localhost:42002/items/"
            req = urllib.request.Request(url, headers={"Authorization": f"Bearer {api_key}"})
            try:
                resp = urllib.request.urlopen(req, timeout=10)
                code = resp.status
            except urllib.error.HTTPError as e:
                code = e.code
            except urllib.error.URLError as e:
                print(f"FAIL: backend unreachable with postgres stopped — {e}")
                sys.exit(0)

            if code == 404:
                print("FAIL: backend returns 404 on DB failure — the planted bug is still present")
            elif code == 500:
                print("PASS")
            else:
                print(f"FAIL: expected HTTP 500, got {code}")
        finally:
            subprocess.run(compose + ["start", "postgres"],
                           capture_output=True, timeout=15, cwd=base)
        PYEOF
      expect_regex: "PASS"
      timeout: 30

