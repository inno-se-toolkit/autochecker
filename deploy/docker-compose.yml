services:
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: .env
    volumes:
      - bot-data:/app/data
      - autochecker-results:/app/results
    environment:
      - DB_PATH=/app/data/bot.db
    restart: unless-stopped

  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: .env
    command: ["uvicorn", "dashboard.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - bot-data:/app/data
      - autochecker-results:/app/results
    environment:
      - DB_PATH=/app/data/bot.db
    restart: unless-stopped

volumes:
  bot-data:
  autochecker-results:
